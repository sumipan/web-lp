name: Release on push to main

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Rewrite OGP URLs for production
        run: |
          sed -i \
            -e 's|https://sumipan\.github\.io/web-lp/|https://sake-awai.corkagency.com/|g' \
            index.html

      - name: Create ZIP
        run: |
          zip -r web-lp-${{ steps.tag.outputs.tag }}.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: "main ブランチへの push による自動リリース (${{ github.sha }})"
          files: web-lp-${{ steps.tag.outputs.tag }}.zip
